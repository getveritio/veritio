name: Bug report
description: Report a reproducible Veritio bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For security vulnerabilities, do not open a public issue; use the guidance in SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Protocol or schema
        - TypeScript SDK
        - Python SDK
        - Go SDK
        - Framework adapter
        - Storage helper
        - Server module
        - Documentation
        - Packaging or CI
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal steps, code, commands, or a failing test.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include package versions, runtime versions, OS, database, framework, or adapter when relevant.
      placeholder: |
        Veritio package:
        Bun:
        Python:
        Go:
        Framework/database:
        OS:
  - type: textarea
    id: integrity
    attributes:
      label: Evidence integrity context
      description: If relevant, mention tenant scope, canonical JSON, hashing, idempotency, redaction, retention, or storage ordering.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: I did not include real secrets, production tokens, private keys, personal data, or customer records.
          required: true
        - label: This is not a security vulnerability report.
          required: true
