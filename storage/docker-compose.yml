# Local live-database targets for the @veritio/storage conformance and
# derived-tier integration suites. Mirrors the service containers used by
# .github/workflows/verify.yml so a local `bun run --cwd storage test:live`
# proves the same adapter behavior CI proves.
#
# All services are ephemeral test infrastructure: no named volumes, throwaway
# credentials, and host ports chosen to avoid this machine's existing
# containers (5433/5434/54329/6380). Never point these at real evidence data.
#
#   docker compose -f storage/docker-compose.yml up -d --wait
#   bun run --cwd storage test:live
#   docker compose -f storage/docker-compose.yml down -v

name: veritio-storage-tests

services:
  postgres:
    image: postgres:16-alpine
    container_name: veritio-storage-postgres
    environment:
      POSTGRES_USER: veritio
      POSTGRES_PASSWORD: veritio
      POSTGRES_DB: veritio
    ports:
      - "54391:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veritio -d veritio"]
      interval: 5s
      timeout: 5s
      retries: 12

  mysql:
    image: mysql:8
    container_name: veritio-storage-mysql
    environment:
      MYSQL_ROOT_PASSWORD: veritio
      MYSQL_DATABASE: veritio
    ports:
      - "33061:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -pveritio"]
      interval: 5s
      timeout: 5s
      retries: 24

  mariadb:
    image: mariadb:11
    container_name: veritio-storage-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: veritio
      MARIADB_DATABASE: veritio
    ports:
      - "33071:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -pveritio"]
      interval: 5s
      timeout: 5s
      retries: 24

  # Single-node replica set: the Mongo adapter's transactional append
  # (client.withSession().withTransaction()) requires a replica set. mongod
  # listens on 27021 inside the container so the replica-set member host it
  # advertises (127.0.0.1:27021) matches the host-mapped port and driver
  # discovery via ?replicaSet=rs0 works from the host.
  mongo:
    image: mongo:7
    container_name: veritio-storage-mongo
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27021"]
    ports:
      - "27021:27021"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          mongosh --quiet --port 27021 --eval
          'try { rs.status().ok } catch (error) { rs.initiate({_id:"rs0",members:[{_id:0,host:"127.0.0.1:27021"}]}).ok }'
      interval: 5s
      timeout: 10s
      retries: 24

  # S3-compatible object storage for the derived archive-tier integration
  # tests. MinIO speaks the same S3 API surface as Cloudflare R2 / AWS S3, so
  # the archive adapter proves against it without any cloud account.
  minio:
    image: minio/minio:latest
    container_name: veritio-storage-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: veritio
      MINIO_ROOT_PASSWORD: veritio-local
    ports:
      - "39000:9000"
      - "39001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  # One-shot bucket provisioning: Bun's S3 client (used by the integration
  # suite) cannot create buckets, so mc creates the test bucket once MinIO is
  # healthy and then exits.
  minio-init:
    image: minio/mc:latest
    container_name: veritio-storage-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "mc alias set local http://minio:9000 veritio veritio-local
      && mc mb --ignore-existing local/veritio-archive"
    restart: "no"

  # Derived analytical read-model target. The ClickHouse adapter talks to the
  # HTTP interface (port 8123) only; the native protocol port is not mapped.
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: veritio-storage-clickhouse
    environment:
      CLICKHOUSE_USER: veritio
      CLICKHOUSE_PASSWORD: veritio
      CLICKHOUSE_DB: veritio
    ports:
      - "38123:8123"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 24
